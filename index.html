<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipment Calendar System</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f4f6;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: auto;
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 15px;
      color: #1f2937;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }

    input, select, button {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      cursor: pointer;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      margin-top: 20px;
    }

    .day-header {
      background: #d1d5db;
      padding: 10px;
      text-align: center;
      font-weight: bold;
      border: 1px solid #cbd5e1;
      font-weight: bold;
    }

    .day {
      background: white;
      border: 1px solid #d1d5db;
      min-height: 180px;
      padding: 8px;
    }

    .date {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .shipment {
      padding: 4px 8px;
      margin-bottom: 4px;
      font-size: 11px;
      color: white;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
      border-radius: 0;
      margin-left: -8px;
      margin-right: -8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shipment:hover {
      transform: scale(1.02);
      z-index: 10;
    }

    .tooltip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      top: 100%;
      left: 0;
      width: 260px;
      background: #111827;
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.6;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      transition: opacity 0.2s;
      z-index: 999;
    }

    .shipment:hover .tooltip {
      visibility: visible;
      opacity: 1;
    }

    .air {
      background: #2563eb;
    }

    .sea {
      background: #0f766e;
    }

    .truck {
      background: #d97706;
    }

    .courier {
      background: #7c3aed;
    }

    .sea {
      background: #dcfce7;
      border: 1px solid #86efac;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
    }

    th {
      background: #e5e7eb;
      padding: 12px;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    @media (max-width: 768px) {
      .calendar {
        grid-template-columns: 1fr;
      }

      .day-header {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Shipment Calendar System</h1>

    <div class="toolbar">
      <button onclick="openModal()">+ Add Shipment</button>

      <input type="file" id="excelUpload" accept=".xlsx,.xls">

      <input type="text" id="searchBox" placeholder="Search Vendor / AWB">

      <select id="filterType">
        <option value="All">All Shipment</option>
        <option value="Air">Air</option>
        <option value="Sea">Sea</option>
        <option value="Truck">Truck</option>
        <option value="Courier">Courier</option>
      </select>
    </div>

    <div class="calendar" id="calendar"></div>

    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Vendor</th>
          <th>ETD</th>
          <th>ETA</th>
          <th>Flight No.</th>
          <th>Vessel No.</th>
          <th>AWB / BL</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="shipmentTable"></tbody>
    </table>
  </div>

  <div class="modal" id="shipmentModal">
    <div class="modal-content">
      <h2>Add Shipment</h2>

      <input type="number" id="startDate" placeholder="ETD Date (1-31)">
      <input type="number" id="endDate" placeholder="ETA Date (1-31)">

      <select id="type">
        <option value="Air">Air</option>
        <option value="Sea">Sea</option>
        <option value="Truck">Truck</option>
        <option value="Courier">Courier</option>
      </select>

      <input type="text" id="vendor" placeholder="Vendor / Customer">
      <input type="text" id="etd" placeholder="ETD">
      <input type="text" id="eta" placeholder="ETA">
      <input type="text" id="flightNo" placeholder="Flight No.">
      <input type="text" id="vesselNo" placeholder="Vessel No.">
      <input type="text" id="awb" placeholder="AWB / BL">

      <button onclick="saveShipment()">Save Shipment</button>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    let editIndex = -1;

    let shipments = JSON.parse(localStorage.getItem('shipments')) || [
      {
        startDate: 15,
        endDate: 20,
        type: 'Air',
        vendor: 'ABC Supplier',
        etd: '15-May-2026',
        eta: '20-May-2026',
        flightNo: 'TG882',
        vesselNo: '-',
        awb: 'AWB12345'
      },
      {
        startDate: 17,
        endDate: 25,
        type: 'Sea',
        vendor: 'XYZ Customer',
        etd: '17-May-2026',
        eta: '25-May-2026',
        flightNo: '-',
        vesselNo: 'VSL009',
        awb: 'BL77889'
      },
      {
        startDate: 10,
        endDate: 12,
        type: 'Truck',
        vendor: 'Fast Trucking',
        etd: '10-May-2026',
        eta: '12-May-2026',
        flightNo: '-',
        vesselNo: '-',
        awb: 'TRK99881'
      },
      {
        startDate: 22,
        endDate: 23,
        type: 'Courier',
        vendor: 'DHL Express',
        etd: '22-May-2026',
        eta: '23-May-2026',
        flightNo: '-',
        vesselNo: '-',
        awb: 'DHL778899'
      }
    ];

    const calendar = document.getElementById('calendar');
    const table = document.getElementById('shipmentTable');

    function saveData() {
      localStorage.setItem('shipments', JSON.stringify(shipments));
    }

    function renderCalendar() {
      calendar.innerHTML = '';
      table.innerHTML = '';

      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

      days.forEach(day => {
        const header = document.createElement('div');
        header.className = 'day-header';
        header.innerText = day;
        calendar.appendChild(header);
      });

      const firstDay = 4;
      const totalDays = 31;

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'day';
        calendar.appendChild(empty);
      }

      const keyword = document.getElementById('searchBox').value.toLowerCase();
      const filter = document.getElementById('filterType').value;

      const filtered = shipments.filter(s => {
        const matchKeyword =
          s.vendor.toLowerCase().includes(keyword) ||
          s.awb.toLowerCase().includes(keyword);

        const matchFilter = filter === 'All' || s.type === filter;

        return matchKeyword && matchFilter;
      });

      for (let d = 1; d <= totalDays; d++) {
        const dayBox = document.createElement('div');
        dayBox.className = 'day';

        const date = document.createElement('div');
        date.className = 'date';
        date.innerText = d;

        dayBox.appendChild(date);

        const dailyShipments = filtered.filter(s => d >= s.startDate && d <= s.endDate);

        dailyShipments.forEach(s => {
          const div = document.createElement('div');

          let classType = 'air';
          if (s.type === 'Sea') classType = 'sea';
          if (s.type === 'Truck') classType = 'truck';
          if (s.type === 'Courier') classType = 'courier';

          div.className = `shipment ${classType}`;

          const isStart = d == s.startDate;
          const isEnd = d == s.endDate;

          div.style.borderTopLeftRadius = isStart ? '8px' : '0';
          div.style.borderBottomLeftRadius = isStart ? '8px' : '0';
          div.style.borderTopRightRadius = isEnd ? '8px' : '0';
          div.style.borderBottomRightRadius = isEnd ? '8px' : '0';

          div.innerHTML = `
            ${isStart ? `<strong>${s.vendor}</strong>` : '&nbsp;'}

            <div class="tooltip">
              <strong>${s.vendor}</strong><br><br>
              Type: ${s.type}<br>
              ETD: ${s.etd}<br>
              ETA: ${s.eta}<br>
              ${s.flightNo !== '-' ? `Flight No: ${s.flightNo}<br>` : ''}
              ${s.vesselNo !== '-' ? `Vessel No: ${s.vesselNo}<br>` : ''}
              AWB/BL: ${s.awb}
            </div>
          `;

          dayBox.appendChild(div);
        });

        calendar.appendChild(dayBox);
      }

      filtered.forEach((s, index) => {
        const realIndex = shipments.indexOf(s);

        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${s.type}</td>
          <td>${s.vendor}</td>
          <td>${s.etd}</td>
          <td>${s.eta}</td>
          <td>${s.flightNo}</td>
          <td>${s.vesselNo}</td>
          <td>${s.awb}</td>
          <td>
            <button onclick="editShipment(${realIndex})">Edit</button>
            <button onclick="deleteShipment(${realIndex})" style="background:#dc2626;margin-left:5px;">
              Delete
            </button>
          </td>
        `;

        table.appendChild(row);
      });
    }

    function openModal() {
      document.getElementById('shipmentModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('shipmentModal').style.display = 'none';
    }

    function saveShipment() {
      const shipment = {
        startDate: parseInt(document.getElementById('startDate').value),
        endDate: parseInt(document.getElementById('endDate').value),
        type: document.getElementById('type').value,
        vendor: document.getElementById('vendor').value,
        etd: document.getElementById('etd').value,
        eta: document.getElementById('eta').value,
        flightNo: document.getElementById('flightNo').value || '-',
        vesselNo: document.getElementById('vesselNo').value || '-',
        awb: document.getElementById('awb').value
      };

      if (editIndex === -1) {
        shipments.push(shipment);
      } else {
        shipments[editIndex] = shipment;
        editIndex = -1;
      }

      saveData();
      renderCalendar();
      closeModal();
      clearForm();
    }

    function editShipment(index) {
      const s = shipments[index];

      document.getElementById('startDate').value = s.startDate;
      document.getElementById('endDate').value = s.endDate;
      document.getElementById('type').value = s.type;
      document.getElementById('vendor').value = s.vendor;
      document.getElementById('etd').value = s.etd;
      document.getElementById('eta').value = s.eta;
      document.getElementById('flightNo').value = s.flightNo;
      document.getElementById('vesselNo').value = s.vesselNo;
      document.getElementById('awb').value = s.awb;

      editIndex = index;
      openModal();
    }

    function deleteShipment(index) {
      if (confirm('Delete this shipment?')) {
        shipments.splice(index, 1);
        saveData();
        renderCalendar();
      }
    }

    function clearForm() {
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      document.getElementById('vendor').value = '';
      document.getElementById('etd').value = '';
      document.getElementById('eta').value = '';
      document.getElementById('flightNo').value = '';
      document.getElementById('vesselNo').value = '';
      document.getElementById('awb').value = '';
    }

    document.getElementById('searchBox').addEventListener('input', renderCalendar);
    document.getElementById('filterType').addEventListener('change', renderCalendar);

    document.getElementById('excelUpload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      const reader = new FileReader();

      reader.onload = function(event) {
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        json.forEach(row => {
          shipments.push({
            startDate: row.StartDate,
            endDate: row.EndDate,
            type: row.Type,
            vendor: row.Vendor,
            etd: row.ETD,
            eta: row.ETA,
            flightNo: row.FlightNo || '-',
            vesselNo: row.VesselNo || '-',
            awb: row.AWB
          });
        });

        saveData();
        renderCalendar();
      };

      reader.readAsArrayBuffer(file);
    });

    renderCalendar();
  </script>
</body>
</html>
